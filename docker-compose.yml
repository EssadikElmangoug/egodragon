services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/usr/share/nginx/html/.well-known
      - certbot-certs:/etc/letsencrypt
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    profiles:
      - certbot

volumes:
  certbot-webroot:
  certbot-certs:
